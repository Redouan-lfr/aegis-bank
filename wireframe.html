<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WF Aegis bank</title>

    <link rel="stylesheet" href="wf.css" />
  </head>
  <body>
    <header>
      <div class="header--burgermenu">
        <img src="images/icons/menu-burger%20(3).svg" alt="menu burger" width="25px">
      </div>

      <div class="header-logo">
          <div class="header-titles">
              <span>AEGIS BANK</span>
              <hr style="width: 80%; opacity: 50%" />
        </div>

      </div>
    </header>
    <main>
      <section class="section-actions">
        <div class="section-actions_container">
          <div class="section-actions_container-elem">Virement</div>
          <div class="section-actions_container-elem">Scanner</div>
          <div class="section-actions_container-elem">Recevoir</div>
        </div>
      </section>

      <section class="section-accounts">
        <h3>MES COMPTES</h3>
        <div class="section-accounts_container">
          <div class="section-accounts_cards">
            <span class="section-accounts_title"> Courant </span>
            <span class="section-accounts_owner">Redouan</span>
            <div class="section-accounts_amount">x.xx €</div>
          </div>
          <div class="section-accounts_cards">
            <span class="section-accounts_title">Epargne</span>
            <span class="section-accounts_owner">Redouan</span>
            <div class="section-accounts_amount">x.xx €</div>
          </div>
          <div class="section-accounts_cards section-accounts_cards--add">
            <img
              src="./images/plus (1).svg"
              alt="more icon"
              class="section-accounts_cards--icon"
            />
          </div>
        </div>
      </section>
    </main>

    <footer>
      <div class="features-btn">
        <a href="#" class="features--scan-btn">lorem</a>
        <a href="#" class="features--receive-btn">lorem</a>
      </div>
      <a href="#" class="connect">Se connecter</a>
    </footer>
  </body>
</html>
